<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Text List Manager</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="page">
      <div class="card">
        <header class="header">
          <h1 class="title">This is a technical proof</h1>
          <p class="description">
            Lorem ipsum dolor sit amet consectetur adipiscing, elit mus primis
            nec inceptos. Lacinia habitasse arcu molestie maecenas cursus quam
            nunc, hendrerit posuere augue fames dictumst placerat porttitor, dis
            mi pharetra vestibulum venenatis phasellus.
          </p>
        </header>

        <div class="list-container">
          <ul id="item-list"></ul>
        </div>

        <div class="actions">
          <div class="left-group">
            <button class="btn btn-undo" id="btn-undo" disabled aria-label="Undo">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 19 19" fill="currentColor">
                <path d="M9.533,15.25c2.742,0,4.977-2.367,4.977-5.125c0-2.756-2.234-5.063-4.977-5.063c-0.928,0-1.99,0.621-2.803,1.113L8.479,8.5H2.5l0.996-6.25l1.949,2.223c1.149-0.844,2.559-1.41,4.088-1.41c3.842,0,6.967,3.109,6.967,6.969c0,3.86-3.125,7.234-6.967,7.234c-2.772,0-5.164-1.766-6.286-3.766h2.329C6.486,14.5,7.914,15.25,9.533,15.25z"/>
              </svg>
            </button>
            <button class="btn btn-delete" id="btn-delete" disabled>Delete</button>
          </div>
          <button class="btn btn-add" id="btn-add">Add</button>
        </div>
      </div>
    </div>

    <div class="overlay" id="modal-overlay" hidden>
      <div class="modal-paper">
        <p class="modal-title">Add item to list</p>
        <input
          type="text"
          class="modal-input"
          id="modal-input"
          placeholder="Type the text here..."
        />
        <div class="modal-actions">
          <button class="btn btn-modal-add" id="btn-modal-add" disabled>ADD</button>
          <button class="btn btn-modal-cancel" id="btn-modal-cancel">CANCEL</button>
        </div>
      </div>
    </div>

    <script src="main.js"></script>
  </body>
</html>
